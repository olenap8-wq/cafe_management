{% extends "base.html" %}

{% block content %}
<div class="table-card" style="padding:20px; max-width:500px;">
    
    <!-- タイトルを切り替え -->
    <h2>{% if product %}商品編集{% else %}商品登録{% endif %}</h2>

    <!-- フォームの送信先を切り替え -->
    <form action="{% if product %}/products/{{ product.id }}/update{% else %}/products{% endif %}" method="POST">
        
        <label>商品名</label>
        <input type="text" name="name" 
               value="{{ product.name if product else '' }}" required>

        <label>カテゴリ</label>
        <input type="text" name="category" 
               value="{{ product.category if product else '' }}">

        <label>在庫アラート数</label>
        <input type="number" name="threshold" 
               value="{{ product.threshold if product else 5 }}">

        <!-- 新規登録のときだけ表示 -->
        {% if not product %}
        <label>初期在庫数</label>
        <input type="number" name="quantity" value="0">
        {% endif %}

        <button class="primary-btn">
            {% if product %}更新する{% else %}登録する{% endif %}
        </button>
    </form>

</div>
{% endblock %}
