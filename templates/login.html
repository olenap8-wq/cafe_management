{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <div class="auth-title">ログイン</div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="
                background:#dcfce7;
                color:#166534;
                padding:10px;
                border-radius:10px;
                margin-bottom:15px;
                font-size:13px;">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

        {% if error %}
        <div style="
            background:#fee2e2;
            color:#991b1b;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            font-size:13px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button class="auth-btn">ログイン</button>

        </form>

        <div class="auth-link">
            アカウントがないですか？ <a href="/register">新規登録</a>
        </div>

    </div>
</div>

{% endblock %}
