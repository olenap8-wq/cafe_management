<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在庫管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom px-4">
    
    <!-- タイトル -->
    <a class="navbar-brand fw-bold text-primary" href="/">
        在庫管理
    </a>

    <!-- 右側 -->
    <div class="ms-auto d-flex align-items-center gap-2">

        <a href="#" class="btn btn-light">お客様</a>
        <a href="#" class="btn btn-light">申し送り</a>
        <a href="/" class="btn btn-primary">在庫管理</a>

        {% if session.get("user_id") %}
            <span class="ms-3">{{ session.get("user_name") }}</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">ログアウト</a>
        {% else %}
            <a href="/login" class="btn btn-outline-primary btn-sm">ログイン</a>
            <a href="/register" class="btn btn-primary btn-sm">登録</a>
        {% endif %}

    </div>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
